# rat-commander localization — English
#
# `name` is what the language is shown as in the Settings dialog; it lets new
# language files be dropped into this directory and picked up automatically.
# Every entry under [strings] maps an English source string (the key, used
# throughout the program) to its translation. A missing key falls back to the
# key itself, so a partial translation still works. Copy this file to a new name
# (e.g. `fr.toml`), change `name`/`code`, and translate the values to add a
# language.

name = "English"
code = "en"

[strings]

